name: Deploy Contracts to Testnet
on:
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
jobs:
  deploy:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            contracts/poll_contract/target
            contracts/rewards_contract/target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}
      # Installs cargo-binstall instantly
      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      # Installs stellar-cli in 3 seconds using the precompiled binary
      - name: Install Stellar CLI
        run: cargo binstall --no-confirm stellar-cli
      # Build standard wasm and optimize it
      - name: Build contracts
        run: |
          cargo build --manifest-path contracts/poll_contract/Cargo.toml --target wasm32-unknown-unknown --release
          cargo build --manifest-path contracts/rewards_contract/Cargo.toml --target wasm32-unknown-unknown --release
          stellar contract optimize --wasm contracts/poll_contract/target/wasm32-unknown-unknown/release/poll_contract.wasm
          stellar contract optimize --wasm contracts/rewards_contract/target/wasm32-unknown-unknown/release/rewards_contract.wasm
      # Deploy the optimized contract
      - name: Deploy to Testnet
        run: |
          echo "Generating identities..."
          stellar keys generate deployer --network testnet
          stellar keys fund deployer --network testnet
          echo "Deploying poll_contract..."
          POLL_CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/poll_contract/target/wasm32-unknown-unknown/release/poll_contract.optimized.wasm \
            --source deployer \
            --network testnet 2>deploy_poll_err.log) || { cat deploy_poll_err.log; exit 1; }
          echo "poll_contract deployed at: $POLL_CONTRACT_ID"
          
          echo "Deploying rewards_contract..."
          REWARDS_CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/rewards_contract/target/wasm32-unknown-unknown/release/rewards_contract.optimized.wasm \
            --source deployer \
            --network testnet 2>deploy_rewards_err.log) || { cat deploy_rewards_err.log; exit 1; }
          echo "rewards_contract deployed at: $REWARDS_CONTRACT_ID"
          
          echo "Fetching Test Token (Native XLM asset) ID..."
          TOKEN_ID=$(stellar contract id asset --asset native --network testnet)
          echo "Native Token ID is: $TOKEN_ID"
